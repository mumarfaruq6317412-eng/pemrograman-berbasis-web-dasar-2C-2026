<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>NutriVita - Susu Sehat Keluarga</title>
    <style>
    
        body { font-family: 'Arial', sans-serif; margin: 0; line-height: 1.6; color: #333; }
        .container { width: 80%; margin: auto; padding: 20px; }
        

        header { background: #e0f7fa; padding: 20px 0; }
        nav { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; color: #00796b; }
        

        .hero { display: flex; align-items: center; padding: 50px 0; }
        .hero-text { flex: 1; }
        .hero-image { flex: 1; text-align: center; }
        .hero-image img { width: 300px; border-radius: 20px; }
        

        .btn { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #00796b; color: white; }
        

        .features { display: flex; justify-content: space-around; margin-top: 30px; }
        .feature-card { background: #f4f4f4; padding: 20px; border-radius: 10px; width: 25%; text-align: center; }
    </style>
</head>
<body>

    <header>
        <nav class="container">
            <div class="logo">NutriVita</div>
            <div>
                <button class="btn btn-primary">Beli Sekarang</button>
            </div>
        </nav>
    </header>

    <main class="hero container">
        <div class="hero-text">
            <h1 style="color: #00796b;">Segarnya Nutrisi, Sepenuh Hati.</h1>
            <p>Susu NutriVita hadir dengan kesegaran alami dari sapi pilihan. Kaya kalsium dan vitamin untuk mendukung aktivitas harianmu dan keluarga.</p>
            <button class="btn btn-primary">Pesan Sekarang</button>
        </div>
        <div class="hero-image">
            <img src="nutri.jpeg" alt="Susu Segar">
        </div>
    </main>

    <section class="features container">
        <div class="feature-card">
            <h3> 100% Alami</h3>
            <p>Tanpa pengawet tambahan.</p>
        </div>
        <div class="feature-card">
            <h3> Tinggi Kalsium</h3>
            <p>Menjaga tulang tetap kuat.</p>
        </div>
        <div class="feature-card">
            <h3> Energi Pagi</h3>
            <p>Cocok untuk sarapan.</p>
        </div>
    </section>

</body>
</html>
